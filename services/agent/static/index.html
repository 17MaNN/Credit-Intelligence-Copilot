<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credit Intelligence Copilot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1B2430;
    --paper: #F7F5F0;
    --slate: #5B6472;
    --ledger-line: #D8D3C7;
    --amber: #C08A2E;
    --status-green: #2F7A4F;
    --status-red: #B23B3B;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--ledger-line);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }

  .brand {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.02em;
  }

  .brand-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--slate);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  main {
    flex: 1;
    display: flex;
    justify-content: center;
    padding: 40px 24px;
  }

  .layout {
    width: 100%;
    max-width: 1080px;
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 32px;
    align-items: start;
  }

  @media (max-width: 860px) {
    .layout { grid-template-columns: 1fr; }
  }

  .app {
    display: flex;
    flex-direction: column;
    gap: 20px;
    min-width: 0;
  }

  .intro { padding-bottom: 8px; }

  .intro h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px;
    font-weight: 600;
    margin: 0 0 8px;
    letter-spacing: -0.01em;
  }

  .intro p {
    color: var(--slate);
    font-size: 15px;
    line-height: 1.5;
    margin: 0;
    max-width: 52ch;
  }

  .thread {
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-height: 240px;
  }

  .entry {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .entry-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--slate);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .entry.user .entry-label { color: var(--amber); }

  .latency-tag {
    color: var(--slate);
    text-transform: none;
    letter-spacing: normal;
  }

  .entry-body {
    background: #FFFFFF;
    border: 1px solid var(--ledger-line);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 15px;
    line-height: 1.55;
    white-space: pre-wrap;
  }

  .entry.user .entry-body {
    background: transparent;
    border-color: transparent;
    padding: 0 2px;
    color: var(--ink);
  }

  .entry.pending .entry-body {
    color: var(--slate);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
  }

  .entry.error .entry-body {
    border-color: var(--status-red);
    color: var(--status-red);
  }

  form {
    display: flex;
    gap: 10px;
    border: 1px solid var(--ledger-line);
    background: #FFFFFF;
    border-radius: 12px;
    padding: 8px 8px 8px 16px;
  }

  textarea {
    flex: 1;
    border: none;
    outline: none;
    resize: none;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    padding: 8px 0;
    max-height: 120px;
    background: transparent;
    color: var(--ink);
  }

  textarea::placeholder { color: var(--slate); }

  button {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 14px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 8px;
    padding: 0 18px;
    cursor: pointer;
    transition: opacity 120ms ease;
  }

  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: default; }

  .hint {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--slate);
    text-align: right;
  }

  /* Audit trail panel */
  .panel {
    position: sticky;
    top: 24px;
    border: 1px solid var(--ledger-line);
    background: #FFFFFF;
    border-radius: 12px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .panel-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--slate);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .panel-empty {
    color: var(--slate);
    font-size: 13px;
    font-family: 'IBM Plex Mono', monospace;
  }

  .steps {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .step {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .step-mark {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    flex-shrink: 0;
    width: 16px;
  }

  .step.success .step-mark { color: var(--status-green); }
  .step.error .step-mark { color: var(--status-red); }

  .step-label {
    font-size: 13px;
    font-weight: 500;
  }

  .step-detail {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--slate);
    margin-top: 2px;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--ledger-line);
    margin: 0;
  }

  .policy-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .policy-ref {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--slate);
    display: flex;
    justify-content: space-between;
    gap: 8px;
  }

  .policy-ref .id { color: var(--ink); }

  @media (prefers-reduced-motion: reduce) {
    button { transition: none; }
  }
</style>
</head>
<body>

<header>
  <span class="brand">Credit Intelligence Copilot</span>
  <span class="brand-tag">Lending &amp; Collections Ops</span>
</header>

<main>
  <div class="layout">
    <div class="app">
      <div class="intro">
        <h1>Describe the customer's situation.</h1>
        <p>The copilot classifies intent, checks credit risk, and retrieves the
        relevant policy on its own before recommending an action.</p>
      </div>

      <div class="thread" id="thread"></div>

      <form id="form">
        <textarea id="input" rows="1" placeholder="e.g. Customer lost their job, income $40k, 3 delinquencies, wants a $15,000 loan" maxlength="4000"></textarea>
        <button type="submit" id="submit">Send</button>
      </form>
      <div class="hint" id="charcount">0 / 4000</div>
    </div>

    <aside class="panel" id="panel">
      <div class="panel-title">
        <span>Audit Trail</span>
        <span id="panel-latency"></span>
      </div>
      <div id="panel-body">
        <div class="panel-empty">Send a message to see which tools the copilot uses and why.</div>
      </div>
    </aside>
  </div>
</main>

<script>
  // Calls /ui/handle-inquiry, a separate endpoint from the key-protected
  // /handle-inquiry used by the eval harness and CI. The browser can't
  // hold a real secret, so this endpoint is public and relies on
  // server-side rate limiting instead of a client-exposed key.
  const API_URL = "/ui/handle-inquiry";

  const thread = document.getElementById('thread');
  const form = document.getElementById('form');
  const input = document.getElementById('input');
  const submitBtn = document.getElementById('submit');
  const charcount = document.getElementById('charcount');
  const panelBody = document.getElementById('panel-body');
  const panelLatency = document.getElementById('panel-latency');

  input.addEventListener('input', () => {
    charcount.textContent = `${input.value.length} / 4000`;
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  function addEntry(label, text, kind, meta) {
    const entry = document.createElement('div');
    entry.className = `entry ${kind}`;
    const labelHtml = meta ? `${label}<span class="latency-tag">${meta}</span>` : label;
    entry.innerHTML = `<div class="entry-label">${labelHtml}</div><div class="entry-body"></div>`;
    entry.querySelector('.entry-body').textContent = text;
    thread.appendChild(entry);
    entry.scrollIntoView({ behavior: 'smooth', block: 'end' });
    return entry;
  }

  function renderPanel(workflow, toolCalls, latencyMs) {
    panelLatency.textContent = `${(latencyMs / 1000).toFixed(1)}s`;

    const stepsHtml = (workflow || []).map(step => {
      const mark = step.status === 'success' ? '✓' : '✗';
      const detail = step.detail ? `<div class="step-detail">${escapeHtml(step.detail)}</div>` : '';
      return `<div class="step ${step.status}">
        <span class="step-mark">${mark}</span>
        <div>
          <div class="step-label">${escapeHtml(step.step)}</div>
          ${detail}
        </div>
      </div>`;
    }).join('');

    // Pull policy references directly from the retrieve_policy tool call,
    // if the agent made one - same underlying data as the audit trail
    // step above, just surfaced with more detail (id + relevance score).
    const policyCall = (toolCalls || []).find(c => c.tool === 'retrieve_policy');
    const policies = policyCall?.result?.data?.results || [];
    const policiesHtml = policies.length
      ? `<hr class="divider"><div class="panel-title">Policies Referenced</div>
         <div class="policy-list">${policies.map(p => `
           <div class="policy-ref"><span class="id">${escapeHtml(p.id)}</span><span>score ${Number(p.score).toFixed(2)}</span></div>
         `).join('')}</div>`
      : '';

    panelBody.innerHTML = `<div class="steps">${stepsHtml}</div>${policiesHtml}`;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const message = input.value.trim();
    if (!message) return;

    addEntry('Customer', message, 'user');
    input.value = '';
    input.style.height = 'auto';
    charcount.textContent = '0 / 4000';
    submitBtn.disabled = true;

    const pending = addEntry('Copilot', 'Working through the request…', 'pending');
    const startTime = performance.now();

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message }),
      });
      const body = await res.json();
      const latencyMs = performance.now() - startTime;

      pending.remove();
      if (body.ok) {
        addEntry('Copilot', body.data.response, 'assistant', `${(latencyMs / 1000).toFixed(1)}s`);
        renderPanel(body.data.workflow, body.data.tool_calls, latencyMs);
      } else {
        addEntry('Copilot', body.error || 'Something went wrong.', 'error');
      }
    } catch (err) {
      pending.remove();
      addEntry('Copilot', 'Could not reach the service. Check your connection and try again.', 'error');
    } finally {
      submitBtn.disabled = false;
    }
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      form.requestSubmit();
    }
  });
</script>

</body>
</html>
