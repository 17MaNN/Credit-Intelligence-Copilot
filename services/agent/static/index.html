<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credit Intelligence Copilot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1B2430;
    --paper: #F7F5F0;
    --slate: #5B6472;
    --ledger-line: #D8D3C7;
    --amber: #C08A2E;
    --status-green: #2F7A4F;
    --status-red: #B23B3B;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--ledger-line);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }

  .brand {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.02em;
  }

  .brand-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--slate);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  main {
    flex: 1;
    display: flex;
    justify-content: center;
    padding: 40px 24px;
  }

  .layout {
    width: 100%;
    max-width: 1080px;
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 32px;
    align-items: start;
  }

  @media (max-width: 860px) {
    .layout { grid-template-columns: 1fr; }
  }

  .app {
    display: flex;
    flex-direction: column;
    gap: 20px;
    min-width: 0;
  }

  .intro { padding-bottom: 8px; }

  .intro h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px;
    font-weight: 600;
    margin: 0 0 8px;
    letter-spacing: -0.01em;
  }

  .intro p {
    color: var(--slate);
    font-size: 15px;
    line-height: 1.5;
    margin: 0;
    max-width: 52ch;
  }

  .thread {
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-height: 240px;
  }

  .entry {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .entry-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--slate);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .entry.user .entry-label { color: var(--amber); }

  .latency-tag {
    color: var(--slate);
    text-transform: none;
    letter-spacing: normal;
  }

  .entry-body {
    background: #FFFFFF;
    border: 1px solid var(--ledger-line);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 15px;
    line-height: 1.55;
    white-space: pre-wrap;
  }

  .entry.user .entry-body {
    background: transparent;
    border-color: transparent;
    padding: 0 2px;
    color: var(--ink);
  }

  .entry.pending .entry-body {
    color: var(--slate);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
  }

  .entry.error .entry-body {
    border-color: var(--status-red);
    color: var(--status-red);
  }

  form {
    display: flex;
    gap: 10px;
    border: 1px solid var(--ledger-line);
    background: #FFFFFF;
    border-radius: 12px;
    padding: 8px 8px 8px 16px;
  }

  textarea {
    flex: 1;
    border: none;
    outline: none;
    resize: none;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    padding: 8px 0;
    max-height: 120px;
    background: transparent;
    color: var(--ink);
  }

  textarea::placeholder { color: var(--slate); }

  button {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 14px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 8px;
    padding: 0 18px;
    cursor: pointer;
    transition: opacity 120ms ease;
  }

  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: default; }

  .hint {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--slate);
    text-align: right;
  }

  .attach-btn {
    background: transparent;
    color: var(--slate);
    font-size: 16px;
    padding: 0 10px;
    border-radius: 8px;
  }

  .attach-btn:hover { background: var(--paper); opacity: 1; }

  .chip-row {
    display: flex;
    gap: 8px;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #FFFFFF;
    border: 1px solid var(--ledger-line);
    border-radius: 8px;
    padding: 6px 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--ink);
  }

  .chip button {
    background: transparent;
    color: var(--slate);
    padding: 0 2px;
    font-size: 14px;
    border-radius: 4px;
  }

  /* Audit trail panel */
  .panel {
    position: sticky;
    top: 24px;
    border: 1px solid var(--ledger-line);
    background: #FFFFFF;
    border-radius: 12px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .panel-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--slate);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .panel-empty {
    color: var(--slate);
    font-size: 13px;
    font-family: 'IBM Plex Mono', monospace;
  }

  .steps {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .step {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .step-mark {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    flex-shrink: 0;
    width: 16px;
  }

  .step.success .step-mark { color: var(--status-green); }
  .step.error .step-mark { color: var(--status-red); }
  .step.pending-step .step-mark { color: var(--amber); }

  .step-label {
    font-size: 13px;
    font-weight: 500;
  }

  .step-detail {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--slate);
    margin-top: 2px;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--ledger-line);
    margin: 0;
  }

  .policy-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .policy-ref {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--slate);
    display: flex;
    justify-content: space-between;
    gap: 8px;
  }

  .policy-ref .id { color: var(--ink); }

  @media (prefers-reduced-motion: reduce) {
    button { transition: none; }
  }
</style>
</head>
<body>

<header>
  <span class="brand">Credit Intelligence Copilot</span>
  <span class="brand-tag">Lending &amp; Collections Ops</span>
</header>

<main>
  <div class="layout">
    <div class="app">
      <div class="intro">
        <h1>Describe the customer's situation.</h1>
        <p>The copilot classifies intent, checks credit risk, and retrieves the
        relevant policy on its own before recommending an action.</p>
      </div>

      <div class="thread" id="thread"></div>

      <form id="form">
        <input type="file" id="fileInput" accept="image/*" hidden>
        <button type="button" id="attachBtn" class="attach-btn" title="Attach a document">📎</button>
        <textarea id="input" rows="1" placeholder="e.g. Customer lost their job, income $40k, 3 delinquencies, wants a $15,000 loan" maxlength="4000"></textarea>
        <button type="submit" id="submit">Send</button>
      </form>
      <div class="chip-row" id="chipRow"></div>
      <div class="hint" id="charcount">0 / 4000</div>
    </div>

    <aside class="panel" id="panel">
      <div class="panel-title">
        <span>Audit Trail</span>
        <span id="panel-latency"></span>
      </div>
      <div id="panel-body">
        <div class="panel-empty">Send a message to see which tools the copilot uses and why.</div>
      </div>
    </aside>
  </div>
</main>

<script>
  const STREAM_URL = "/ui/handle-inquiry/stream";

  const thread = document.getElementById('thread');
  const form = document.getElementById('form');
  const input = document.getElementById('input');
  const submitBtn = document.getElementById('submit');
  const charcount = document.getElementById('charcount');
  const panelBody = document.getElementById('panel-body');
  const panelLatency = document.getElementById('panel-latency');
  const fileInput = document.getElementById('fileInput');
  const attachBtn = document.getElementById('attachBtn');
  const chipRow = document.getElementById('chipRow');

  const MAX_FILE_BYTES = 8 * 1024 * 1024;
  let attachedFile = null;

  attachBtn.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;

    if (file.size > MAX_FILE_BYTES) {
      alert('That file is too large (max 8MB).');
      fileInput.value = '';
      return;
    }

    const reader = new FileReader();
    reader.onload = () => {
      const base64 = reader.result.split(',')[1];
      attachedFile = { name: file.name, base64 };
      renderChip();
    };
    reader.readAsDataURL(file);
  });

  function renderChip() {
    chipRow.innerHTML = '';
    if (!attachedFile) return;
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.innerHTML = `<span>${escapeHtml(attachedFile.name)}</span>`;
    const removeBtn = document.createElement('button');
    removeBtn.type = 'button';
    removeBtn.textContent = '✕';
    removeBtn.addEventListener('click', () => {
      attachedFile = null;
      fileInput.value = '';
      renderChip();
    });
    chip.appendChild(removeBtn);
    chipRow.appendChild(chip);
  }

  input.addEventListener('input', () => {
    charcount.textContent = `${input.value.length} / 4000`;
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  function addEntry(label, text, kind, meta) {
    const entry = document.createElement('div');
    entry.className = `entry ${kind}`;
    const labelHtml = meta ? `${label}<span class="latency-tag">${meta}</span>` : label;
    entry.innerHTML = `<div class="entry-label">${labelHtml}</div><div class="entry-body"></div>`;
    entry.querySelector('.entry-body').textContent = text;
    thread.appendChild(entry);
    entry.scrollIntoView({ behavior: 'smooth', block: 'end' });
    return entry;
  }

  function renderStepPending(tool, label) {
    const el = document.createElement('div');
    el.className = 'step pending-step';
    el.innerHTML = `<span class="step-mark">…</span><div><div class="step-label">${escapeHtml(label)}</div></div>`;
    panelBody.appendChild(el);
    return el;
  }

  function renderStepDone(el, label, status, detail) {
    if (!el) return;
    el.className = `step ${status}`;
    const mark = status === 'success' ? '✓' : '✗';
    const detailHtml = detail ? `<div class="step-detail">${escapeHtml(detail)}</div>` : '';
    el.innerHTML = `<span class="step-mark">${mark}</span><div><div class="step-label">${escapeHtml(label)}</div>${detailHtml}</div>`;
  }

  function renderPolicyReferences(toolCalls) {
    const policyCall = (toolCalls || []).find(c => c.tool === 'retrieve_policy');
    const policies = policyCall?.result?.data?.results || [];
    if (!policies.length) return;
    const div = document.createElement('div');
    div.innerHTML = `<hr class="divider"><div class="panel-title">Policies Referenced</div>
       <div class="policy-list">${policies.map(p => `
         <div class="policy-ref"><span class="id">${escapeHtml(p.id)}</span><span>score ${Number(p.score).toFixed(2)}</span></div>
       `).join('')}</div>`;
    panelBody.appendChild(div);
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  async function streamSSE(response, onEvent) {
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const parts = buffer.split('\n\n');
      buffer = parts.pop();
      for (const part of parts) {
        if (part.startsWith('data: ')) {
          onEvent(JSON.parse(part.slice(6)));
        }
      }
    }
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const message = input.value.trim();
    if (!message) return;

    const fileNote = attachedFile ? ` 📎 ${attachedFile.name}` : '';
    addEntry('Customer', message + fileNote, 'user');

    const imageToSend = attachedFile ? attachedFile.base64 : null;
    input.value = '';
    input.style.height = 'auto';
    charcount.textContent = '0 / 4000';
    attachedFile = null;
    fileInput.value = '';
    renderChip();
    submitBtn.disabled = true;

    const assistantEntry = addEntry('Copilot', '', 'assistant');
    const bodyEl = assistantEntry.querySelector('.entry-body');
    let accumulatedText = '';
    const startTime = performance.now();

    panelBody.innerHTML = '';
    panelLatency.textContent = '';
    const stepElements = new Map();

    try {
      const res = await fetch(STREAM_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, image_base64: imageToSend }),
      });
      if (!res.ok || !res.body) throw new Error('stream request failed');

      await streamSSE(res, (event) => {
        if (event.type === 'tool_start') {
          stepElements.set(event.tool, renderStepPending(event.tool, event.label));
        } else if (event.type === 'tool_end') {
          renderStepDone(stepElements.get(event.tool), event.label, event.status, event.detail);
        } else if (event.type === 'text_delta') {
          accumulatedText += event.text;
          bodyEl.textContent = accumulatedText;
          assistantEntry.scrollIntoView({ behavior: 'smooth', block: 'end' });
        } else if (event.type === 'done') {
          const latencyMs = performance.now() - startTime;
          panelLatency.textContent = `${(latencyMs / 1000).toFixed(1)}s`;
          renderPolicyReferences(event.tool_calls);
          const meta = document.createElement('span');
          meta.className = 'latency-tag';
          meta.textContent = `${(latencyMs / 1000).toFixed(1)}s`;
          assistantEntry.querySelector('.entry-label').appendChild(meta);
        } else if (event.type === 'error') {
          bodyEl.textContent = event.error || 'Something went wrong.';
          assistantEntry.className = 'entry error';
        }
      });

      if (panelBody.children.length === 0) {
        panelBody.innerHTML = '<div class="panel-empty">No tools were needed for this response.</div>';
      }
    } catch (err) {
      bodyEl.textContent = 'Could not reach the service. Check your connection and try again.';
      assistantEntry.className = 'entry error';
    } finally {
      submitBtn.disabled = false;
    }
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      form.requestSubmit();
    }
  });
</script>

</body>
</html>
