apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-model
  namespace: credit-copilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: risk-model
  template:
    metadata:
      labels:
        app: risk-model
    spec:
      containers:
        - name: risk-model
          image: risk-model:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: credit-copilot-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: risk-model
  namespace: credit-copilot
spec:
  selector:
    app: risk-model
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP